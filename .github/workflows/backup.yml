name: DB Backup

on:
  schedule:
    - cron: '0 6 * * *' # 3am Argentina (UTC-3)
  workflow_dispatch: # permite correrlo manualmente desde GitHub

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Instalar PostgreSQL 17
        run: |
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-17

      - name: Backup base de datos
        run: /usr/lib/postgresql/17/bin/pg_dump "${{ secrets.DATABASE_URL }}" > backup.sql

      - name: Guardar backup
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_id }}
          path: backup.sql
          retention-days: 30
